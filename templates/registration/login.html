<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – Einkaufsliste</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f0f4ff; --surface:#fff; --border:#dde3f5; --border2:#c8d1ee;
      --primary:#4f6ef7; --primary-h:#3a58e0; --primary-lt:#eef1fe;
      --text:#1e2346; --text2:#5a6080; --text3:#9399b8;
      --red:#ef4444; --red-lt:#fee2e2; --radius:14px; --radius-sm:9px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;
      font-weight:600;min-height:100vh;display:flex;align-items:center;
      justify-content:center;padding:1rem;}
    .wrap{width:100%;max-width:370px;}
    .brand{text-align:center;margin-bottom:2rem;}
    .brand-icon{font-size:3rem;display:block;margin-bottom:.5rem;}
    .brand h1{font-size:1.6rem;font-weight:900;color:var(--primary);letter-spacing:-.02em;}
    .brand p{color:var(--text3);font-size:.85rem;margin-top:.2rem;}
    .card{background:var(--surface);border:1.5px solid var(--border);
      border-radius:var(--radius);padding:1.75rem;
      box-shadow:0 4px 24px rgba(79,110,247,.1);}
    .form-group{margin-bottom:1rem;}
    label{display:block;font-size:.72rem;color:var(--text3);font-weight:800;
      text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem;}
    input[type=text],input[type=password]{
      width:100%;background:#f7f9ff;border:1.5px solid var(--border);
      border-radius:var(--radius-sm);color:var(--text);
      padding:.6rem .9rem;font-size:.95rem;font-family:'Nunito',sans-serif;
      font-weight:600;outline:none;transition:border-color .15s,box-shadow .15s;}
    input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.12);background:#fff;}
    .remember-row{display:flex;align-items:center;gap:.6rem;margin-bottom:1.25rem;
      font-size:.85rem;color:var(--text2);}
    input[type=checkbox]{accent-color:var(--primary);width:16px;height:16px;}
    .remember-row label{margin:0;text-transform:none;letter-spacing:0;
      font-size:.85rem;font-weight:700;cursor:pointer;color:var(--text2);}
    .btn-submit{width:100%;background:var(--primary);color:#fff;border:none;
      border-radius:var(--radius-sm);padding:.7rem;
      font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;
      cursor:pointer;transition:background .15s,transform .1s;
      box-shadow:0 2px 8px rgba(79,110,247,.3);}
    .btn-submit:hover{background:var(--primary-h);transform:translateY(-1px);}
    .form-errors{background:var(--red-lt);border:1.5px solid #fecaca;
      border-radius:var(--radius-sm);padding:.65rem 1rem;
      color:var(--red);font-size:.85rem;margin-bottom:1rem;font-weight:700;}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <span class="brand-icon">🛒</span>
      <h1>Einkaufsliste</h1>
      <p>Bitte anmelden um fortzufahren</p>
    </div>
    <div class="card">
      {% if form.errors %}
      <div class="form-errors">⚠ Benutzername oder Passwort falsch.</div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="id_username">Benutzername</label>
          <input type="text" name="username" id="id_username" autofocus autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="id_password">Passwort</label>
          <input type="password" name="password" id="id_password" autocomplete="current-password" required>
        </div>
        <div class="remember-row">
          <input type="checkbox" name="remember" id="remember" checked>
          <label for="remember">Angemeldet bleiben</label>
        </div>
        <button type="submit" class="btn-submit">Anmelden</button>
        <input type="hidden" name="next" value="{{ next }}">
      </form>
    </div>
  </div>
</body>
</html>
