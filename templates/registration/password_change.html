{% extends "base.html" %}
{% block title %}Passwort ändern{% endblock %}
{% block content %}
<div class="page-header"><h1 class="page-title">🔑 Passwort ändern</h1></div>
<div class="card form-page">
  <form method="post" class="form-stack">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-row">
      <label class="form-label">{{ field.label }}</label>
      <input type="password" name="{{ field.html_name }}" class="form-input"
        autocomplete="{% if field.html_name == 'old_password' %}current-password{% else %}new-password{% endif %}" required>
      {% for error in field.errors %}<span style="color:var(--red);font-size:.8rem;font-weight:700">⚠ {{ error }}</span>{% endfor %}
    </div>
    {% endfor %}
    <div style="display:flex;gap:.65rem;margin-top:.25rem">
      <button type="submit" class="btn btn-primary">Speichern</button>
      <a href="{% url 'liste' %}" class="btn btn-ghost">Abbrechen</a>
    </div>
  </form>
</div>
{% endblock %}
